<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OdilCoder | Telegram Project</title>
    <style>
        /* Umumiy ko'rinish */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f4f4f9;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #222;
        }

        /* Markaziy karta */
        .container {
            background: #ffffff;
            width: 90%;
            max-width: 400px;
            padding: 40px 20px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            text-align: center;
        }

        /* Profil rasmi (Telegram logosi) */
        .profile-img {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, #54a9eb, #2481cc);
            border-radius: 50%;
            margin: 0 auto 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 5px 15px rgba(36, 129, 204, 0.3);
        }

        .profile-img svg {
            width: 60px;
            fill: white;
        }

        /* Matnlar */
        h1 {
            font-size: 24px;
            margin: 10px 0;
            color: #2481cc;
        }

        p {
            font-size: 16px;
            color: #707579;
            line-height: 1.5;
            margin-bottom: 30px;
        }

        /* Telegram tugmasi */
        .btn {
            display: block;
            background-color: #2481cc;
            color: white;
            text-decoration: none;
            padding: 15px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 18px;
            transition: all 0.3s ease;
        }

        .btn:hover {
            background-color: #1c6ca8;
            transform: translateY(-2px);
        }

        /* Pastki info */
        .footer {
            margin-top: 20px;
            font-size: 12px;
            color: #999;
        }
    </style>
</head>
<body>

    <div class="container">

        </div>
        
        <h1>OdilCoder Bot</h1>
